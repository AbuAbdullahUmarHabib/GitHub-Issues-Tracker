<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issue Tracker</title>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        html {
            background: #F8FAFC;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <div class="flex h-screen mx-auto justify-center items-center">
                <fieldset
                    class="fieldset bg-white shadow-xl border-base-300 rounded-box sm:w-11/12 md:w-4/12 border p-8">

                    <img src="./assets/github-logo.png" alt="Github Logo" class="mx-auto w-25">

                    <h1 class="font-bold text-center text-2xl">GitHub Issues Tracker</h1>
                    <p class="text-center text-neutral-500 text-sm">Sign in to manage your issues</p>

                    <label class="label text-gray-900 text-base">Username</label>
                    <input id="userName" type="text" class="input w-full" placeholder="Enter Username" />
                    <p class="text-primary">Default: admin</p>


                    <label class="label text-gray-900 text-base">Password</label>
                    <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                    <p class="text-primary">Default: admin123</p>


                    <button id="signIn" class="btn btn-primary mt-4">Sign In</button>
                    <p></p>
                    <div class="divider">OR</div>
                    <p class="text-center text-neutral-500 text-sm">Demo Credentials:</p>

                    <div class="card bg-base-300 rounded-box grid p-5 place-items-center">
                        <p><span class="font-bold">Username:</span> admin</p>
                        <p><span class="font-bold">Password:</span> admin123</p>
                    </div>

                </fieldset>
            </div>
        </section>
    </main>

    <script src="./scripts/login.js"></script>
</body>

</html>
