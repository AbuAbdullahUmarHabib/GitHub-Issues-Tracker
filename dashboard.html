<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Dashboard | GitHub Issue Tracker</title>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        html {
            background: #F8FAFC;
        }
    </style>
</head>

<body>
    <header>
        <div class="flex max-sm:flex-col gap-4 navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <img src="./assets/github-logo.png" alt="logo" class="h-8">
                    <a class="text-2xl font-bold">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">

                <input id="searchInput" value="" type="text" placeholder="Search issues..."
                    class="input input-bordered w-40 md:w-auto" />


                <div>
                    <button id="searchBtn" class="text-base btn btn-primary"><span><i
                                class="fa-solid fa-plus"></i></span>New
                        Issue</button>
                </div>

            </div>
        </div>
    </header>

    <main class="w-11/12 mx-auto mt-10">
        <!-- Tab Container -->
        <section id="tab-container">
            <div class="card card-body flex-row bg-white shadow-sm">
                <button id="allIssues" class="btn btn-primary py-2 px-6">All</button>
                <button id="openIssues" class="btn btn-outline border-neutral-300 py-2 px-6">Open</button>
                <button id="closeIssues" class="btn btn-outline border-neutral-300 py-2 px-6">Closed</button>
            </div>

        </section>


        <!-- Open the modal using ID.showModal() method -->
        <dialog id="issueDetails" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <h3 id="issueTitle" class="text-lg font-bold"></h3>
                <div class="flex items-center gap-2">
                    <div id="issueStatusBadge" class="badge badge-success rounded-full"></div>
                    <p class="text-xs text-neutral-500">• Opened by <span id="issueAuthor" class="rounded-full"></span>
                    </p>
                    <p id="issueCreatedDate" class="text-xs text-neutral-500"></p>
                </div>
                <div class="card-actions mt-4">
                    <div id="issueLabel" class="uppercase rounded-full"><i class="fa-solid fa-bug"></i>
                    </div>
                </div>
                <p id="issueDescription" class="py-4 text-neutral-500"></p>

                <div class="bg-base-200 rounded-xl py-4 px-10 flex justify-between items-center">
                    <div>
                        <p>Assignee:</p>
                        <p id="issueAssignee" class="font-bold"></p>
                    </div>
                    <div>
                        <p>Priority:</p>
                        <div id="issuePriority" class="badge badge-error text-white uppercase rounded-full">
                        </div>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        <!-- Task section -->
        <section class="mt-4">
            <div class="px-4 py-4 bg-white shadow-sm rounded-lg">
                <div class="flex max-sm:flex-col justify-between items-center">
                    <div class="task flex items-center gap-2">
                        <div class="flex bg-primary-content rounded-full h-16 w-16 justify-center items-center">
                            <img src="./assets/Aperture.png" alt="" class="h-12 w-12">
                        </div>
                        <div>
                            <h3 class="font-bold text-base"> <span id="total-task">0</span> Issues</h3>
                            <p class="text-center text-neutral-500 text-sm">Track and manage your project issues</p>
                        </div>
                    </div>
                    <!-- Status Indicator -->
                    <div class="flex gap-6">
                        <div class="indicator items-center">
                            <span class="indicator-item indicator-start indicator-middle status status-success"></span>
                            <div class="ml-3">Open</div>
                        </div>
                        <div class="indicator items-center">
                            <span
                                class="indicator-item indicator-start indicator-middle status status-secondary"></span>
                            <div class="ml-3">Closed</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Task -->
            <div id="spinner" class="flex mx-auto items-center justify-center hidden">
                <span class="loading loading-bars loading-xl"></span>
            </div>

            <section id="tasks"
                class=" grid md:grid-cols-4 sm:grid-cols-2 gap-4 bg-gray-100 card-body p-4 rounded-xl rounded-t-none -mt-1 ">


                <!-- cards -->

    </main>

</body>
